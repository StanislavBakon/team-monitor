<!DOCTYPE html>
<html>
<head>
  <title>Team Monitor</title>

  <style>
    :root {
      --bg-dark: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      --bg-light: linear-gradient(135deg, #e0e0e0, #ffffff);

      --glass-dark: rgba(255, 255, 255, 0.08);
      --glass-light: rgba(255, 255, 255, 0.6);

      --text-dark: white;
      --text-light: black;
    }

    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      transition: 0.3s;
    }

    body[data-theme="dark"] {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    body[data-theme="light"] {
      background: var(--bg-light);
      color: var(--text-light);
    }

    .glass {
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.2);
      padding: 20px;
      transition: 0.3s;
    }

    body[data-theme="dark"] .glass {
      background: var(--glass-dark);
    }

    body[data-theme="light"] .glass {
      background: var(--glass-light);
    }

    .sidebar {
      width: 220px;
      margin: 15px;
    }

    .sidebar button {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.2);
    }

    .main {
      flex: 1;
      margin: 15px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .toggle {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body data-theme="dark">

  <div class="sidebar glass">
    <h2>Team Monitor</h2>

    <button onclick="showPage('overview')">Overview</button>
    <button onclick="showPage('master')">Master Data</button>
    <button onclick="showPage('tasks')">Task Tracker</button>
    <button onclick="showPage('notes')">Notes Tracker</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="toggle" onclick="toggleTheme()">🌙 / ☀️</button>
    </div>

    <div class="glass" id="content">
      <h1>Overview</h1>
      <p>Welcome to your dashboard</p>
    </div>
  </div>

  <script>
    function showPage(page) {
      const content = document.getElementById("content");

      if (page === "overview") {
        content.innerHTML = "<h1>Overview</h1><p>Dashboard coming soon</p>";
      }

      if (page === "master") {
        content.innerHTML = "<h1>Master Data</h1><p>Employee list coming soon</p>";
      }

      if (page === "tasks") {
        content.innerHTML = "<h1>Task Tracker</h1><p>Tasks coming soon</p>";
      }

      if (page === "notes") {
        content.innerHTML = "<h1>Notes Tracker</h1><p>Notes coming soon</p>";
      }

      if (page === "settings") {
        content.innerHTML = "<h1>Settings</h1><p>Settings coming soon</p>";
      }
    }

    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute("data-theme");

      const newTheme = current === "dark" ? "light" : "dark";
      body.setAttribute("data-theme", newTheme);

      localStorage.setItem("theme", newTheme);
    }

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      document.body.setAttribute("data-theme", savedTheme);
    }
  </script>

</body>
</html>
