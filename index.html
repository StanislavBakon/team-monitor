<!DOCTYPE html>
<html>
<head>
  <title>Team Monitor</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #ff9a00, #ff5e00, #ff2d55);
      color: #1d1d1f;
    }

    /* Frosted glass */
    .glass {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .sidebar {
      width: 220px;
      margin: 20px;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .sidebar button {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.8);
      transform: scale(1.02);
    }

    .main {
      flex: 1;
      margin: 20px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    /* Optional: cards for future */
    .card {
      padding: 20px;
      margin-top: 10px;
      border-radius: 15px;
      background: rgba(255,255,255,0.5);
    }

  </style>
</head>

<body>

  <div class="sidebar glass">
    <h2>Team Monitor</h2>

    <button onclick="showPage('overview')">Overview</button>
    <button onclick="showPage('master')">Master Data</button>
    <button onclick="showPage('tasks')">Task Tracker</button>
    <button onclick="showPage('notes')">Notes Tracker</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>

  <div class="main glass" id="content">
    <h1>Overview</h1>
    <div class="card">Welcome to your dashboard</div>
  </div>

  <script>
    function showPage(page) {
      const content = document.getElementById("content");

      if (page === "overview") {
        content.innerHTML = "<h1>Overview</h1><div class='card'>Dashboard coming soon</div>";
      }

      if (page === "master") {
        content.innerHTML = "<h1>Master Data</h1><div class='card'>Employee list coming soon</div>";
      }

      if (page === "tasks") {
        content.innerHTML = "<h1>Task Tracker</h1><div class='card'>Tasks coming soon</div>";
      }

      if (page === "notes") {
        content.innerHTML = "<h1>Notes Tracker</h1><div class='card'>Notes coming soon</div>";
      }

      if (page === "settings") {
        content.innerHTML = "<h1>Settings</h1><div class='card'>Settings coming soon</div>";
      }
    }
  </script>

</body>
</html>
