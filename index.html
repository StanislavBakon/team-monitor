<!DOCTYPE html>
<html>
<head>
  <title>Team Monitor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      height: 100vh;
      display: flex;
      color: white;
    }

    /* Glass effect */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .sidebar {
      width: 220px;
      margin: 15px;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.2);
    }

    .main {
      flex: 1;
      margin: 15px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

  </style>
</head>

<body>

  <div class="sidebar glass">
    <h2>Team Monitor</h2>

    <button onclick="showPage('overview')">Overview</button>
    <button onclick="showPage('master')">Master Data</button>
    <button onclick="showPage('tasks')">Task Tracker</button>
    <button onclick="showPage('notes')">Notes Tracker</button>
    <button onclick="showPage('settings')">Settings</button>
  </div>

  <div class="main glass" id="content">
    <h1>Overview</h1>
    <p>Welcome to your dashboard</p>
  </div>

  <script>
    function showPage(page) {
      const content = document.getElementById("content");

      if (page === "overview") {
        content.innerHTML = "<h1>Overview</h1><p>Dashboard coming soon</p>";
      }

      if (page === "master") {
        content.innerHTML = "<h1>Master Data</h1><p>Employee list coming soon</p>";
      }

      if (page === "tasks") {
        content.innerHTML = "<h1>Task Tracker</h1><p>Tasks coming soon</p>";
      }

      if (page === "notes") {
        content.innerHTML = "<h1>Notes Tracker</h1><p>Notes coming soon</p>";
      }

      if (page === "settings") {
        content.innerHTML = "<h1>Settings</h1><p>Settings coming soon</p>";
      }
    }
  </script>

</body>
</html>
